<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZwemSpots</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a7ea4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ZwemSpots" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --water: #0a7ea4;
      --water-dark: #0a2540;
      --water-light: #e0f4fa;
      --open: #22c55e;
      --closed: #ef4444;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 16px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--water-dark);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    header {
      background: var(--water-dark);
      color: white;
      padding: 14px 16px 10px;
      padding-top: max(14px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--water);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--water); }
    .header-btns { display: flex; gap: 8px; }
    .icon-btn {
      background: rgba(255,255,255,0.12);
      border: none; color: white;
      width: 38px; height: 38px;
      border-radius: 50%; cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .icon-btn:active { background: rgba(255,255,255,0.25); }

    /* SEARCH BAR */
    .search-bar {
      background: var(--water-dark);
      padding: 0 16px 10px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .search-input {
      flex: 1;
      padding: 9px 14px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 14px;
      outline: none;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.45); }
    .search-btn {
      padding: 9px 14px;
      border-radius: 12px;
      border: none;
      background: var(--water);
      color: white;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .search-btn:active { opacity: 0.85; }

    /* FILTER */
    .filter-bar {
      background: var(--water-dark);
      padding: 0 16px 10px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      padding: 5px 12px;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: transparent;
      color: rgba(255,255,255,0.7);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .filter-chip.active {
      background: var(--water);
      border-color: var(--water);
      color: white;
    }

    /* VIEW TOGGLE */
    .view-toggle {
      display: flex;
      background: var(--water-dark);
      padding: 0 16px 10px;
      gap: 8px;
      flex-shrink: 0;
    }
    .toggle-btn {
      flex: 1; padding: 8px;
      border: none; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      transition: all 0.2s;
    }
    .toggle-btn.active { background: var(--water); color: white; }

    /* MAP */
    #map {
      width: 100%;
      height: 45vh;
      flex-shrink: 0;
      transition: height 0.35s cubic-bezier(.4,0,.2,1);
    }
    body.map-mode #map { height: calc(100dvh - 200px); }
    body.list-mode #map { height: 30vh; }

    /* LIST */
    .spots-container {
      flex: 1;
      overflow-y: auto;
      background: #f1f5f9;
      -webkit-overflow-scrolling: touch;
    }
    body.map-mode .spots-container { display: none; }
    .spots-list { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

    /* LOADING */
    .loading-state {
      display: none;
      text-align: center;
      padding: 40px 24px;
      color: var(--muted);
    }
    .loading-state.visible { display: block; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--water);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { font-size: 14px; color: var(--muted); }

    /* EMPTY */
    .empty-state {
      display: none;
      text-align: center;
      padding: 40px 24px;
      color: var(--muted);
    }
    .empty-state.visible { display: block; }
    .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* SPOT CARD */
    .spot-card {
      background: white;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .spot-card:active { transform: scale(0.985); }

    .photos-strip {
      display: grid;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: 85px 85px;
      gap: 2px;
      height: 172px;
      background: var(--water-light);
    }
    .photo-main { grid-row: 1 / 3; position: relative; overflow: hidden; }
    .photos-strip img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .photo-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #bae6fd, #7dd3fc);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
    }
    .photo-side { overflow: hidden; background: var(--water-light); }

    .spot-info { padding: 12px 14px 14px; }
    .spot-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .spot-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .status-badge {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }
    .status-badge.open { background: #dcfce7; color: #166534; }
    .status-badge.closed { background: #fee2e2; color: #991b1b; }
    .status-badge.unknown { background: #f1f5f9; color: #64748b; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-badge.open .status-dot { background: var(--open); }
    .status-badge.closed .status-dot { background: var(--closed); }
    .status-badge.unknown .status-dot { background: #94a3b8; }

    .spot-meta { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
    .meta-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); }

    .hours-row {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid #f1f5f9;
      display: flex; align-items: center; gap: 6px;
    }
    .hours-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--muted); min-width: 48px;
    }
    .hours-today { font-size: 13px; font-weight: 600; color: var(--text); }
    .hours-expand {
      margin-left: auto; background: none; border: none;
      color: var(--water); font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .hours-full { display: none; margin-top: 8px; background: #f8fafc; border-radius: 10px; overflow: hidden; }
    .hours-full.visible { display: block; }
    .hours-full table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .hours-full td { padding: 6px 10px; border-bottom: 1px solid #f1f5f9; }
    .hours-full tr:last-child td { border-bottom: none; }
    .hours-full td:first-child { font-weight: 600; color: var(--muted); }
    .hours-full td:last-child { text-align: right; color: var(--text); }
    .hours-full tr.today td { background: var(--water-light); }
    .hours-full tr.today td:first-child { color: var(--water); }

    /* RESULT COUNT */
    .result-count {
      padding: 8px 16px 0;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      flex-shrink: 0;
      background: var(--water-dark);
    }

    /* MARKER */
    .marker-pin {
      width: 26px; height: 26px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 3px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .marker-pin.open { background: var(--open); }
    .marker-pin.closed { background: var(--closed); }
    .marker-pin.unknown { background: #94a3b8; }

    .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
    .leaflet-popup-content { margin: 0; }
    .popup-inner { padding: 10px 13px; min-width: 160px; }
    .popup-name { font-weight: 700; font-size: 13px; margin-bottom: 3px; color: var(--text); }
    .popup-type { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .popup-status { font-size: 12px; font-weight: 600; }
    .popup-status.open { color: #166534; }
    .popup-status.closed { color: #991b1b; }
    .popup-status.unknown { color: #64748b; }
    .popup-hours { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* RADIUS SELECTOR */
    .radius-bar {
      background: var(--water-dark);
      padding: 0 16px 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .radius-bar label { font-size: 12px; color: rgba(255,255,255,0.6); white-space: nowrap; }
    .radius-bar input[type=range] { flex: 1; accent-color: var(--water); }
    .radius-val { font-size: 12px; font-weight: 700; color: white; min-width: 40px; text-align: right; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🏊</div>
    <h1>Zwem<span>Spots</span></h1>
  </div>
  <div class="header-btns">
    <button class="icon-btn" id="locateBtn" title="Mijn locatie">📍</button>
  </div>
</header>

<div class="search-bar">
  <input class="search-input" type="text" id="searchInput" placeholder="Zoek stad of postcode…" />
  <button class="search-btn" id="searchBtn">Zoek</button>
</div>

<div class="radius-bar">
  <label>Straal</label>
  <input type="range" id="radiusSlider" min="1" max="50" value="10" step="1" />
  <span class="radius-val" id="radiusVal">10 km</span>
</div>

<div class="filter-bar">
  <button class="filter-chip active" data-filter="all">Alles</button>
  <button class="filter-chip" data-filter="swimming_pool">🏛 Zwembad</button>
  <button class="filter-chip" data-filter="lake">🏞 Meer / Plas</button>
  <button class="filter-chip" data-filter="open">✅ Nu open</button>
</div>

<div class="result-count" id="resultCount"></div>

<div class="view-toggle">
  <button class="toggle-btn" id="btnMap">🗺 Kaart</button>
  <button class="toggle-btn active" id="btnList">☰ Lijst</button>
</div>

<main>
  <div id="map"></div>

  <div class="spots-container">
    <div class="spots-list" id="spotsList">
      <div class="loading-state visible" id="loadingState">
        <div class="spinner"></div>
        <p>Locatie bepalen…</p>
      </div>
      <div class="empty-state" id="emptyState">
        <div class="emoji">🏊</div>
        <p>Geen zwemplekken gevonden.<br>Probeer een grotere straal.</p>
      </div>
    </div>
  </div>
</main>

<script>
// ── CONFIG ──────────────────────────────────────────────
const OVERPASS_URL = 'https://overpass-api.de/api/interpreter';
const NL_BOUNDS = { minLat: 50.75, maxLat: 53.55, minLng: 3.35, maxLng: 7.25 };

const DAY_SHORT = ['zo','ma','di','wo','do','vr','za'];
const DAY_FULL  = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];

// Pool photos by type (Unsplash)
const TYPE_PHOTOS = {
  swimming_pool: [
    'https://images.unsplash.com/photo-1575429198097-0414ec08e8cd?w=600&q=80',
    'https://images.unsplash.com/photo-1519315901367-f34ff9154487?w=300&q=80',
    'https://images.unsplash.com/photo-1526958097901-5e6d742d3371?w=300&q=80',
    'https://images.unsplash.com/photo-1571902943202-507ec2618e8f?w=300&q=80',
  ],
  lake: [
    'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&q=80',
    'https://images.unsplash.com/photo-1519046904884-53103b34b206?w=300&q=80',
    'https://images.unsplash.com/photo-1520942702018-0862200e6873?w=300&q=80',
    'https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?w=300&q=80',
  ],
  default: [
    'https://images.unsplash.com/photo-1470219556762-1771e7f9427d?w=600&q=80',
    'https://images.unsplash.com/photo-1563453392212-326f5e854473?w=300&q=80',
    'https://images.unsplash.com/photo-1519315901367-f34ff9154487?w=300&q=80',
    'https://images.unsplash.com/photo-1575429198097-0414ec08e8cd?w=300&q=80',
  ]
};

// ── STATE ───────────────────────────────────────────────
let userLat = 52.3676, userLng = 4.9041; // Amsterdam default
let radiusKm = 10;
let activeFilter = 'all';
let allSpots = [];
let markerLayer = null;

// ── MAP ─────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false, attributionControl: false })
  .setView([userLat, userLng], 11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
L.control.attribution({ prefix: false, position: 'bottomright' })
  .addAttribution('© <a href="https://carto.com">CARTO</a> © <a href="https://www.openstreetmap.org/copyright">OSM</a>')
  .addTo(map);
L.control.zoom({ position: 'topright' }).addTo(map);

// User location circle
let userCircle = null;
function showUserOnMap(lat, lng) {
  if (userCircle) { userCircle.remove(); }
  userCircle = L.circleMarker([lat, lng], {
    radius: 8, fillColor: '#3b82f6', fillOpacity: 1,
    color: 'white', weight: 2.5
  }).addTo(map).bindTooltip('Jouw locatie', { permanent: false });
  L.circle([lat, lng], {
    radius: radiusKm * 1000,
    color: '#3b82f6', fillColor: '#3b82f6',
    fillOpacity: 0.05, weight: 1.5, dashArray: '4 4'
  }).addTo(map);
}

// ── OVERPASS QUERY ───────────────────────────────────────
function buildQuery(lat, lng, radiusM) {
  return `
[out:json][timeout:25];
(
  node["leisure"="swimming_pool"]["access"!="private"]["access"!="no"](around:${radiusM},${lat},${lng});
  way["leisure"="swimming_pool"]["access"!="private"]["access"!="no"](around:${radiusM},${lat},${lng});
  node["leisure"="swimming_area"](around:${radiusM},${lat},${lng});
  way["leisure"="swimming_area"](around:${radiusM},${lat},${lng});
  node["natural"="water"]["swimming"="yes"](around:${radiusM},${lat},${lng});
  way["natural"="water"]["swimming"="yes"](around:${radiusM},${lat},${lng});
);
out center tags;
`.trim();
}

async function fetchSpots(lat, lng, radiusM) {
  const query = buildQuery(lat, lng, radiusM);
  const resp = await fetch(OVERPASS_URL, {
    method: 'POST',
    body: 'data=' + encodeURIComponent(query)
  });
  if (!resp.ok) throw new Error('Overpass fout: ' + resp.status);
  return resp.json();
}

// ── PARSE OSM ────────────────────────────────────────────
function parseHours(ohStr) {
  if (!ohStr) return null;
  const result = {};
  const dayMap = {
    'Mo': 'ma', 'Tu': 'di', 'We': 'wo', 'Th': 'do',
    'Fr': 'vr', 'Sa': 'za', 'Su': 'zo',
    'PH': null
  };
  // Simple patterns: "Mo-Fr 08:00-21:00; Sa-Su 09:00-17:00"
  const parts = ohStr.split(';').map(s => s.trim()).filter(Boolean);
  parts.forEach(part => {
    const m = part.match(/^([A-Za-z,\-]+)\s+([\d:]+)-([\d:]+)$/);
    if (!m) {
      // "24/7"
      if (part === '24/7') {
        ['ma','di','wo','do','vr','za','zo'].forEach(d => result[d] = '00:00–24:00');
      }
      return;
    }
    const dayPart = m[1];
    const timeStr = m[2] + '–' + m[3];

    // expand ranges like Mo-Fr
    const rangeMatch = dayPart.match(/^([A-Za-z]+)-([A-Za-z]+)$/);
    if (rangeMatch) {
      const allOSM = ['Mo','Tu','We','Th','Fr','Sa','Su'];
      const start = allOSM.indexOf(rangeMatch[1]);
      const end   = allOSM.indexOf(rangeMatch[2]);
      if (start >= 0 && end >= 0) {
        for (let i = start; i <= end; i++) {
          const k = dayMap[allOSM[i]];
          if (k) result[k] = timeStr;
        }
      }
    } else {
      // comma separated: Mo,We,Fr
      dayPart.split(',').forEach(d => {
        const k = dayMap[d.trim()];
        if (k) result[k] = timeStr;
      });
    }
  });
  return Object.keys(result).length ? result : null;
}

function isOpenNow(hours) {
  if (!hours) return null; // unknown
  const dayKey = DAY_SHORT[new Date().getDay()];
  const today = hours[dayKey];
  if (!today) return false;
  if (today === 'Gesloten') return false;
  if (today.includes('00:00–24:00')) return true;
  const m = today.match(/(\d+):(\d+)\s*[–-]\s*(\d+):(\d+)/);
  if (!m) return null;
  const open  = parseInt(m[1]) * 60 + parseInt(m[2]);
  const close = parseInt(m[3]) * 60 + parseInt(m[4]);
  const now   = new Date().getHours() * 60 + new Date().getMinutes();
  return now >= open && now < close;
}

function getTodayHours(hours) {
  if (!hours) return 'Onbekend';
  const dayKey = DAY_SHORT[new Date().getDay()];
  return hours[dayKey] || 'Onbekend';
}

function osmToSpot(el) {
  const tags = el.tags || {};
  const lat = el.lat ?? el.center?.lat;
  const lng = el.lon ?? el.center?.lon;
  if (!lat || !lng) return null;

  const leisure = tags.leisure || '';
  const natural = tags.natural || '';
  let type = 'default';
  if (leisure === 'swimming_pool') type = 'swimming_pool';
  else if (leisure === 'swimming_area' || (natural === 'water' && tags.swimming === 'yes')) type = 'lake';

  const name = tags.name || tags['name:nl'] || (type === 'swimming_pool' ? 'Zwembad' : 'Zwemplek');
  const hours = parseHours(tags.opening_hours);

  // distance from user
  const dist = haversine(userLat, userLng, lat, lng);

  return {
    id: el.type + el.id,
    name,
    type,
    lat, lng,
    address: [tags['addr:street'], tags['addr:housenumber'], tags['addr:city']].filter(Boolean).join(' ') || null,
    website: tags.website || tags.url || null,
    phone: tags.phone || null,
    hours,
    distance: dist < 1 ? Math.round(dist * 1000) + ' m' : dist.toFixed(1) + ' km',
    distRaw: dist,
    photos: TYPE_PHOTOS[type] || TYPE_PHOTOS.default,
    tags: [
      tags.fee === 'no' ? 'gratis' : tags.fee === 'yes' ? 'betaald' : null,
      tags.indoor === 'yes' ? 'overdekt' : null,
      tags.lifeguard ? 'toezicht' : null,
      tags.surface ? tags.surface : null,
    ].filter(Boolean)
  };
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── RENDER MARKERS ───────────────────────────────────────
function renderMarkers(spots) {
  if (markerLayer) { markerLayer.clearLayers(); }
  markerLayer = L.layerGroup().addTo(map);

  spots.forEach(spot => {
    const open = isOpenNow(spot.hours);
    const cls = open === true ? 'open' : open === false ? 'closed' : 'unknown';
    const icon = L.divIcon({
      html: `<div class="marker-pin ${cls}"></div>`,
      className: '', iconSize: [26, 26], iconAnchor: [13, 26], popupAnchor: [0, -28]
    });
    const typeLabel = spot.type === 'swimming_pool' ? '🏛 Zwembad' : spot.type === 'lake' ? '🏞 Zwemplek' : '💧 Zwemgebied';
    const statusLabel = open === true ? '● Nu open' : open === false ? '● Gesloten' : '● Onbekend';
    L.marker([spot.lat, spot.lng], { icon })
      .addTo(markerLayer)
      .bindPopup(`
        <div class="popup-inner">
          <div class="popup-name">${spot.name}</div>
          <div class="popup-type">${typeLabel} · ${spot.distance}</div>
          <div class="popup-status ${cls}">${statusLabel}</div>
          <div class="popup-hours">Vandaag: ${getTodayHours(spot.hours)}</div>
        </div>
      `);
  });
}

// ── RENDER CARDS ─────────────────────────────────────────
function buildHoursTable(hours) {
  if (!hours) return '<tr><td colspan="2" style="text-align:center;color:#94a3b8">Geen tijden bekend</td></tr>';
  const todayKey = DAY_SHORT[new Date().getDay()];
  const order = ['ma','di','wo','do','vr','za','zo'];
  const names  = {ma:'Maandag',di:'Dinsdag',wo:'Woensdag',do:'Donderdag',vr:'Vrijdag',za:'Zaterdag',zo:'Zondag'};
  return order.map(k => `
    <tr class="${k === todayKey ? 'today' : ''}">
      <td>${names[k]}</td>
      <td>${hours[k] || 'Gesloten'}</td>
    </tr>`).join('');
}

function renderCards() {
  const list   = document.getElementById('spotsList');
  const empty  = document.getElementById('emptyState');
  const loading = document.getElementById('loadingState');
  loading.classList.remove('visible');

  let filtered = allSpots.filter(s => {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'open') return isOpenNow(s.hours) === true;
    return s.type === activeFilter;
  });

  document.getElementById('resultCount').textContent =
    filtered.length ? `${filtered.length} locaties gevonden` : '';

  // clear existing cards
  list.querySelectorAll('.spot-card').forEach(el => el.remove());

  if (!filtered.length) {
    empty.classList.add('visible');
    return;
  }
  empty.classList.remove('visible');

  renderMarkers(filtered);

  filtered.forEach(spot => {
    const open = isOpenNow(spot.hours);
    const cls  = open === true ? 'open' : open === false ? 'closed' : 'unknown';
    const statusText = open === true ? 'Open' : open === false ? 'Gesloten' : 'Onbekend';
    const typeLabel = spot.type === 'swimming_pool' ? '🏛 Zwembad' : '🏞 Zwemplek';

    const card = document.createElement('div');
    card.className = 'spot-card';
    card.innerHTML = `
      <div class="photos-strip">
        <div class="photo-main">
          <img src="${spot.photos[0]}" alt="${spot.name}" loading="lazy" />
        </div>
        <div class="photo-side"><img src="${spot.photos[1]}" alt="" loading="lazy" /></div>
        <div class="photo-side"><img src="${spot.photos[2]}" alt="" loading="lazy" /></div>
      </div>
      <div class="spot-info">
        <div class="spot-header">
          <div class="spot-name">${spot.name}</div>
          <div class="status-badge ${cls}">
            <span class="status-dot"></span>${statusText}
          </div>
        </div>
        <div class="spot-meta">
          <span class="meta-item">📍 ${spot.distance}</span>
          <span class="meta-item">${typeLabel}</span>
          ${spot.tags.slice(0,2).map(t => `<span class="meta-item">• ${t}</span>`).join('')}
        </div>
        <div class="hours-row">
          <span class="hours-label">Vandaag</span>
          <span class="hours-today">${getTodayHours(spot.hours)}</span>
          ${spot.hours ? `<button class="hours-expand" data-id="${spot.id}">Alle tijden ▾</button>` : ''}
        </div>
        ${spot.hours ? `
        <div class="hours-full" id="hours-${spot.id}">
          <table>${buildHoursTable(spot.hours)}</table>
        </div>` : ''}
      </div>
    `;

    card.addEventListener('click', e => {
      if (e.target.closest('.hours-expand')) return;
      map.flyTo([spot.lat, spot.lng], 15, { animate: true, duration: 0.8 });
      document.body.classList.remove('map-mode','list-mode');
      document.getElementById('btnList').classList.add('active');
      document.getElementById('btnMap').classList.remove('active');
    });

    list.appendChild(card);
  });

  // hours expand
  document.querySelectorAll('.hours-expand').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const el = document.getElementById('hours-' + btn.dataset.id);
      el.classList.toggle('visible');
      btn.textContent = el.classList.contains('visible') ? 'Verbergen ▴' : 'Alle tijden ▾';
    });
  });
}

// ── LOAD DATA ────────────────────────────────────────────
async function loadSpots() {
  document.getElementById('loadingState').classList.add('visible');
  document.getElementById('emptyState').classList.remove('visible');
  document.getElementById('resultCount').textContent = '';
  document.querySelectorAll('.spot-card').forEach(el => el.remove());

  try {
    const data = await fetchSpots(userLat, userLng, radiusKm * 1000);
    allSpots = data.elements
      .map(osmToSpot)
      .filter(Boolean)
      .sort((a, b) => a.distRaw - b.distRaw);

    renderCards();
  } catch (err) {
    document.getElementById('loadingState').classList.remove('visible');
    document.getElementById('emptyState').classList.add('visible');
    document.getElementById('emptyState').innerHTML = `
      <div class="emoji">⚠️</div>
      <p>Kon geen data ophalen.<br>Controleer je internetverbinding.</p>`;
    console.error(err);
  }
}

// ── GEOCODE (Nominatim) ───────────────────────────────────
async function geocode(query) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query + ', Nederland')}&format=json&limit=1&countrycodes=nl`;
  const resp = await fetch(url, { headers: { 'Accept-Language': 'nl' } });
  const data = await resp.json();
  if (!data.length) return null;
  return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), name: data[0].display_name };
}

// ── UI EVENTS ────────────────────────────────────────────
document.getElementById('radiusSlider').addEventListener('input', e => {
  radiusKm = parseInt(e.target.value);
  document.getElementById('radiusVal').textContent = radiusKm + ' km';
});
document.getElementById('radiusSlider').addEventListener('change', () => {
  showUserOnMap(userLat, userLng);
  loadSpots();
});

document.getElementById('searchBtn').addEventListener('click', async () => {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const result = await geocode(q);
  if (!result) {
    alert('Locatie niet gevonden. Probeer een andere plaatsnaam of postcode.');
    return;
  }
  userLat = result.lat;
  userLng = result.lng;
  map.setView([userLat, userLng], 12);
  showUserOnMap(userLat, userLng);
  loadSpots();
});

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('searchBtn').click();
});

document.getElementById('locateBtn').addEventListener('click', () => {
  if (!navigator.geolocation) return alert('Locatie niet beschikbaar in je browser.');
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    map.flyTo([userLat, userLng], 12, { duration: 1 });
    showUserOnMap(userLat, userLng);
    loadSpots();
  }, () => alert('Kon locatie niet bepalen.'));
});

document.querySelectorAll('.filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

const btnMap  = document.getElementById('btnMap');
const btnList = document.getElementById('btnList');
btnMap.addEventListener('click', () => {
  document.body.classList.add('map-mode');
  document.body.classList.remove('list-mode');
  btnMap.classList.add('active');
  btnList.classList.remove('active');
  setTimeout(() => map.invalidateSize(), 350);
});
btnList.addEventListener('click', () => {
  document.body.classList.remove('map-mode','list-mode');
  btnMap.classList.remove('active');
  btnList.classList.add('active');
  setTimeout(() => map.invalidateSize(), 350);
});

// ── INIT ─────────────────────────────────────────────────
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    map.setView([userLat, userLng], 12);
    showUserOnMap(userLat, userLng);
    loadSpots();
  }, () => {
    // fallback: Culemborg
    showUserOnMap(userLat, userLng);
    loadSpots();
  });
} else {
  showUserOnMap(userLat, userLng);
  loadSpots();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
